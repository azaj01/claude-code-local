name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why is this useful?
  - type: input
    id: hardware
    attributes:
      label: Your Mac model + RAM (if relevant)
      placeholder: "e.g. M2 Air 24GB"
